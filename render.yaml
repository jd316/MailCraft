services:
  - type: web
    name: mailcraft
    runtime: python
    repo: https://github.com/jd316/MailCraft.git
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: MODEL_PRIMARY
        value: gemini-2.0-flash
      - key: MODEL_SECONDARY
        value: gemini-2.0-flash
      - key: MODEL_JUDGE
        value: gemini-2.0-flash
      - key: JUDGE_PROVIDER
        value: gemini
      - key: GEN_TEMPERATURE
        value: "0.3"
      - key: GEN_MAX_TOKENS
        value: "4096"
      - key: GEN_TIMEOUT_SECONDS
        value: "60"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/app.db
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: ENABLE_SECURITY_HEADERS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.3"
